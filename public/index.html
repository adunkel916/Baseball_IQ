<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Green Bombers Baseball IQ</title>
  
  <base href="/Baseball_IQ/public/">
  
  <meta name="description" content="Test your baseball situational awareness! A fun quiz app for the Green Bombers 8U baseball team.">
  <meta name="theme-color" content="#060c06">
  
  <link rel="icon" type="image/jpeg" href="images/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css?v=70.0">
</head>
<body>

<div id="menu-screen" class="container centered">
  <img src="images/logo.jpg" class="logo" alt="Green Bombers">
  <p class="team-name">Green Bombers</p>
  <h1 class="title">Baseball IQ</h1>
  <p class="subtitle">Do you know where to be on every play?</p>
  <div class="diamond-wrap" id="menu-diamond"></div>
  <div class="name-section">
    <label class="name-label">Your Name</label>
    <input type="text" class="name-input" id="player-name" placeholder="Enter your name..." maxlength="20">
  </div>
  <div class="cat-section">
    <p class="cat-label">Category</p>
    <div class="cat-wrap" id="category-buttons"></div>
  </div>
  <button class="start-btn" id="start-btn">Play Ball!</button>
</div>

<div id="play-screen" class="container hidden">
  <div class="header-bar">
    <button id="quit-btn" style="background:none; border:none; color:var(--text-dim); font-size:13px; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:2px; font-family:var(--font);">← HOME</button>
    <div class="q-counter" id="q-counter"></div>
    <div class="score-area">
      <span class="score-correct" id="score-display"></span>
      <span class="streak hidden" id="streak-display"></span>
    </div>
  </div>
  
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  
  <div class="cat-badge" id="cat-badge"></div>
  
  <div class="diamond-container">
    <div class="diamond-wrap" id="play-diamond"></div>
    <div class="confetti-wrap hidden" id="confetti"></div>
  </div>
  
  <div class="situation-box">
    <p class="situation-text" id="situation-text"></p>
    <p class="question-text" id="question-text"></p>
  </div>
  
  <div class="options" id="options-wrap"></div>
  
  <div class="feedback hidden" id="feedback">
    <p id="feedback-text"></p>
  </div>
  
  <div style="text-align:center;margin-top:20px" class="hidden" id="next-wrap">
    <button class="next-btn" id="next-btn"></button>
  </div>
</div>

<div id="results-screen" class="container centered hidden">
  <div class="results-hero">
    <img src="images/logo.jpg" class="logo" alt="Green Bombers" style="width:100px;height:100px;">
    <h2 class="results-grade" id="results-grade"></h2>
    <p class="results-name hidden" id="results-name"></p>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-score" style="color:var(--green-bright)"></div>
      <div class="stat-label">Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-pct" style="color:var(--text-dim)"></div>
      <div class="stat-label">Percent</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-streak" style="color:var(--gold)"></div>
      <div class="stat-label">Best Streak</div>
    </div>
  </div>
  <div class="results-actions">
    <button class="start-btn small" id="play-again-btn">Play Again!</button>
    <button class="next-btn ghost" id="main-menu-btn">Main Menu</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
